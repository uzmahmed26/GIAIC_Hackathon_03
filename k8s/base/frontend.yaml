apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: learnflow
  labels:
    app: frontend
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: learnflow/frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: NEXT_PUBLIC_TRIAGE_URL
              value: "http://triage-agent.learnflow.svc.cluster.local:8001"
            - name: TRIAGE_URL
              value: "http://triage-agent.learnflow.svc.cluster.local:8001"
            - name: CONCEPTS_URL
              value: "http://concepts-agent.learnflow.svc.cluster.local:8002"
            - name: DEBUG_URL
              value: "http://debug-agent.learnflow.svc.cluster.local:8003"
            - name: EXERCISE_URL
              value: "http://exercise-agent.learnflow.svc.cluster.local:8004"
            - name: PROGRESS_URL
              value: "http://progress-agent.learnflow.svc.cluster.local:8005"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: learnflow
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      name: http
      nodePort: 30080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: learnflow
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: learnflow.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
