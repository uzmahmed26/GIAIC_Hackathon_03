# NOTE: For production, use Sealed Secrets or External Secrets Operator.
# This file is a template — real values are injected via kubectl create secret.
# Apply with:
#   kubectl create secret generic learnflow-secrets \
#     --from-literal=OPENAI_API_KEY=$OPENAI_API_KEY \
#     --from-literal=DATABASE_URL=postgresql://learnflow:learnflow123@postgres-postgresql.postgres.svc.cluster.local:5432/learnflow \
#     -n learnflow --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: learnflow-secrets
  namespace: learnflow
type: Opaque
stringData:
  OPENAI_API_KEY: "REPLACE_WITH_REAL_KEY"
  OPENAI_MODEL: "gpt-4o-mini"
  DATABASE_URL: "postgresql://learnflow:learnflow123@postgres-postgresql.postgres.svc.cluster.local:5432/learnflow"
  DAPR_HTTP_PORT: "3500"
  PUBSUB_NAME: "pubsub"
  LOG_LEVEL: "INFO"
  STRUGGLE_THRESHOLD: "3"
