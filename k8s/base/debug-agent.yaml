apiVersion: apps/v1
kind: Deployment
metadata:
  name: debug-agent
  namespace: learnflow
  labels:
    app: debug-agent
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: debug-agent
  template:
    metadata:
      labels:
        app: debug-agent
      annotations:
        dapr.io/enabled: "true"
        dapr.io/app-id: "debug-agent"
        dapr.io/app-port: "8003"
        dapr.io/log-level: "info"
        dapr.io/enable-api-logging: "true"
        dapr.io/sidecar-cpu-request: "50m"
        dapr.io/sidecar-memory-request: "64Mi"
        dapr.io/sidecar-cpu-limit: "200m"
        dapr.io/sidecar-memory-limit: "256Mi"
    spec:
      containers:
        - name: debug-agent
          image: learnflow/debug-agent:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8003
              name: http
          envFrom:
            - secretRef:
                name: learnflow-secrets
          env:
            - name: SERVICE_PORT
              value: "8003"
            - name: STRUGGLE_THRESHOLD
              value: "3"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: debug-agent
  namespace: learnflow
  labels:
    app: debug-agent
spec:
  selector:
    app: debug-agent
  ports:
    - port: 8003
      targetPort: 8003
      name: http
