[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    unit: pure Python unit tests, no external services required
    llm: requires OPENAI_API_KEY and running services
    kafka: requires Kafka running at localhost:9092
    db: requires PostgreSQL running
    slow: tests that take more than 5 seconds
